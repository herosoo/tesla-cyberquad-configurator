<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesla Cyberquad | Configure</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo">TESLA <span>Cyberquad</span></div>
    <div class="loading-track">
      <div id="loading-bar"></div>
    </div>
    <div id="loading-percent">0%</div>
  </div>

  <!-- 3D Canvas -->
  <canvas id="canvas"></canvas>

  <!-- App UI Overlay -->
  <div id="app-ui">

    <!-- Top Bar -->
    <div class="top-bar">
      <div class="logo"><img src="/images/tesla-logo.png" alt="Tesla" class="logo-img" /></div>

      <div class="top-actions">
        <div class="view-buttons">
          <button class="view-btn" data-view="front">Front</button>
          <button class="view-btn" data-view="side">Side</button>
          <button class="view-btn" data-view="rear">Rear</button>
          <button class="view-btn" data-view="top">Top</button>
        </div>

        <button id="day-night-toggle" title="Switch to Night">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Configuration Panel -->
    <div class="config-panel-wrapper">
      <div id="config-panel"></div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <div class="price-cta">
        <div class="price-display">
          <div class="price-label">Starting at</div>
          <div id="total-price" data-value="3990">$3,990</div>
        </div>
        <button class="cta-button">Order Now</button>
      </div>
    </div>

  </div>

  <!-- Compare Features Modal -->
  <div id="compare-modal" class="compare-modal">
    <div class="compare-modal-inner">
      <div class="compare-header">
        <h2 class="compare-title">Compare Builds</h2>
        <div class="compare-header-right">
          <button class="compare-close" id="compare-close">&times;</button>
        </div>
      </div>
      <div id="compare-body" class="compare-body"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
