<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tesla Cyberquad | Configure</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo"><img src="/images/tesla-logo.png" alt="Tesla" class="loading-logo-img" /></div>
    <div class="loading-track">
      <div id="loading-bar"></div>
    </div>
    <div id="loading-percent">0%</div>
  </div>

  <!-- 3D Canvas -->
  <canvas id="canvas"></canvas>

  <!-- App UI Overlay -->
  <div id="app-ui">

    <!-- Top Bar -->
    <div class="top-bar">
      <div class="logo"><img src="/images/tesla-logo.png" alt="Tesla" class="logo-img" /></div>

      <div class="top-actions">
        <div class="view-buttons">
          <button class="view-btn" data-view="front">Front</button>
          <button class="view-btn" data-view="side">Side</button>
          <button class="view-btn" data-view="rear">Rear</button>
          <button class="view-btn" data-view="top">Top</button>
        </div>

      </div>
    </div>

    <!-- Configuration Panel -->
    <div class="config-panel-wrapper">
      <div id="config-panel"></div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <div class="price-cta">
        <div class="price-display">
          <div class="price-label">Vehicle Price</div>
          <div id="total-price" data-value="3990">$3,990</div>
        </div>
        <button class="cta-button">Order Now</button>
      </div>
    </div>

  </div>

  <!-- Compare Features Modal -->
  <div id="compare-modal" class="compare-modal">
    <div class="compare-modal-inner">
      <div class="compare-header">
        <h2 class="compare-title">Compare Builds</h2>
        <div class="compare-header-right">
          <button class="compare-close" id="compare-close">&times;</button>
        </div>
      </div>
      <div id="compare-body" class="compare-body"></div>
    </div>
  </div>

  <!-- Trail Finder Modal -->
  <div id="trail-modal" class="trail-modal">
    <div class="trail-modal-inner">
      <div class="trail-header">
        <h2 class="trail-title">Find ATV Trails</h2>
        <div class="trail-header-right">
          <button class="trail-close" id="trail-close">&times;</button>
        </div>
      </div>
      <div class="trail-filters">
        <input type="text" id="trail-search" class="trail-search" placeholder="Search by trail name, city, or state..." />
        <div class="trail-difficulty-tabs">
          <button class="trail-tab active" data-difficulty="all">All</button>
          <button class="trail-tab" data-difficulty="Easy">Easy</button>
          <button class="trail-tab" data-difficulty="Moderate">Moderate</button>
          <button class="trail-tab" data-difficulty="Hard">Hard</button>
        </div>
      </div>
      <div id="trail-body" class="trail-body"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
